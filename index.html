<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Imager</title>

  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    body{margin:0;font-family:Arial;background:#fff;color:#111}
    .hidden{display:none}

    /* MENU */
    .menu{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
    .logo{font-size:48px;font-weight:900;letter-spacing:-2px}
    .subtitle{color:#666;margin-bottom:20px}
    .menu-buttons button{margin:10px;padding:14px 22px;border-radius:999px;border:1px solid #ddd;cursor:pointer}
    .primary{background:#000;color:#fff}

    /* NAV */
    nav{display:flex;justify-content:space-between;padding:20px;border-bottom:1px solid #eee}

    .container{padding:40px;max-width:1000px;margin:auto}

    .upload-btn{border:1px solid #ddd;padding:10px 16px;border-radius:999px;cursor:pointer}

    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:20px}

    .card{border-radius:20px;overflow:hidden;border:1px solid #eee}
    .card img{width:100%;height:220px;object-fit:cover}

    .muted{color:#777}
  </style>
</head>

<body>

<!-- MAIN MENU -->
<section id="menu" class="menu">
  <h1 class="logo">The Imager</h1>
  <p class="subtitle">choose a mode</p>

  <div class="menu-buttons">
    <button id="btnMaker" class="primary">Room Maker</button>
    <button id="btnExplorer">Room Explorer</button>
  </div>
</section>

<!-- MAKER -->
<section id="maker" class="hidden">
  <nav>
    <h1>Room Maker</h1>
    <button id="backMaker">back</button>
  </nav>

  <div class="container">
    <h2>build your showroom</h2>

    <input id="upload" type="file" multiple hidden />
    <label for="upload" class="upload-btn">upload images</label>

    <div id="gallery" class="grid"></div>
  </div>
</section>

<!-- EXPLORER -->
<section id="explorer" class="hidden">
  <nav>
    <h1>Room Explorer</h1>
    <button id="backExplorer">back</button>
  </nav>

  <div class="container">
    <h2>discover rooms</h2>
    <p class="muted">public showrooms coming soon</p>
  </div>
</section>

<script>
const menu = document.getElementById("menu");
const maker = document.getElementById("maker");
const explorer = document.getElementById("explorer");

const btnMaker = document.getElementById("btnMaker");
const btnExplorer = document.getElementById("btnExplorer");

const backMaker = document.getElementById("backMaker");
const backExplorer = document.getElementById("backExplorer");

const upload = document.getElementById("upload");
const gallery = document.getElementById("gallery");

let images = [];

function show(view){
  menu.classList.add("hidden");
  maker.classList.add("hidden");
  explorer.classList.add("hidden");

  view.classList.remove("hidden");
}

btnMaker.onclick = () => show(maker);
btnExplorer.onclick = () => show(explorer);
backMaker.onclick = () => show(menu);
backExplorer.onclick = () => show(menu);

upload.addEventListener("change", (e)=>{
  const files = Array.from(e.target.files);
  files.forEach(f => images.push(URL.createObjectURL(f)));
  render();
});

function render(){
  gallery.innerHTML = "";
  images.forEach(src => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<img src='${src}' />`;
    gallery.appendChild(div);
  });
}
</script>

</body>
</html>
